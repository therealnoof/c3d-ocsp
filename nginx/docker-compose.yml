# =============================================================
#  Backend nginx — docker-compose
# =============================================================
#  Stands up the C3D demo backend. Mounts:
#    - the backend server cert/key issued by Server CA
#    - the Forging CA's public cert (the trust store for client
#      cert validation; nginx accepts anything BIG-IP forges
#      under this key)
#    - nginx.conf which wires both of those together
#
#  Run from the repo root:
#    docker compose -f nginx/docker-compose.yml up -d
#    docker compose -f nginx/docker-compose.yml logs -f
# =============================================================

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: c3d-backend
    hostname: c3d.nginx.com
    ports:
      - "443:443"
    volumes:
      - ../out/backend/backend.crt:/etc/nginx/certs/backend.crt:ro
      - ../out/backend/backend.key:/etc/nginx/certs/backend.key:ro
      - ../out/backend/forging-ca.crt:/etc/nginx/certs/forging-ca.crt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
