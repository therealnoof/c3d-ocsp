# =============================================================
#  nginx.conf — backend that BIG-IP egresses to with C3D
# =============================================================
#  Two important things going on here:
#
#  1. We require client certs (`ssl_verify_client on`) and trust
#     the FORGING CA (`ssl_client_certificate forging-ca.crt`).
#     SSLO terminates the original client TLS, then opens a NEW
#     TLS connection to us with a forged client cert minted from
#     the Forging CA's key. Because we trust the Forging CA, the
#     forged cert validates and the request goes through.
#
#  2. We log $ssl_client_s_dn so you can SEE the original client's
#     CN coming through inside the forged cert. That's the whole
#     point of the C3D demo — proving the original identity is
#     preserved through the inspection point.
# =============================================================

worker_processes  1;
events { worker_connections 1024; }

http {
    log_format c3d '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   'client_cn=[$ssl_client_s_dn] verify=[$ssl_client_verify]';
    access_log /var/log/nginx/access.log c3d;

    server {
        listen 443 ssl;
        http2 on;
        server_name c3d.nginx.com;

        # ── server identity (TLS to BIG-IP) ──────────────────
        ssl_certificate     /etc/nginx/certs/backend.crt;
        ssl_certificate_key /etc/nginx/certs/backend.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # ── client cert verification (the C3D part) ──────────
        # Trust the FORGING CA only. nginx will accept any cert
        # the BIG-IP forges with that key.
        ssl_client_certificate /etc/nginx/certs/forging-ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # ── show the forged client identity in the page ──────
        # Useful as a visual confirmation during the demo: the
        # browser eventually sees the original CN even though
        # the BIG-IP terminated the original TLS.
        location / {
            default_type text/plain;
            return 200 'C3D backend reached.\n\nForged client subject: $ssl_client_s_dn\nForged cert verify:   $ssl_client_verify\n\n(If the subject matches your Win 11 client cert CN, C3D is preserving identity end-to-end.)\n';
        }
    }
}
