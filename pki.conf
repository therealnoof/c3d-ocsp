# ===============================================================
#  pki.conf — central PKI configuration for the C3D + OCSP demo
# ===============================================================
#  Every script under scripts/ sources this file for hostnames,
#  paths, and validity windows. Change a value here, re-run the
#  affected script, and everything downstream picks it up.
#
#  The "topology" this represents:
#
#    Win 11 client ──TLS+mTLS──▶ BIG-IP (c3d.app.com / 10.1.10.10)
#                                     │
#                                     │  SSLO inbound + C3D
#                                     │  - validates client cert via OCSP
#                                     │  - forges a new client cert
#                                     │
#                                     ▼
#                                Backend nginx (c3d.nginx.com)
#
#    OCSP responder (ocsp.demo.com:2560) sits off to the side;
#    BIG-IP queries it during client cert validation.
# ===============================================================

# --- Hostnames / IPs -------------------------------------------
BIGIP_VIP_FQDN="c3d.app.com"
BIGIP_VIP_IP="10.1.10.10"
BACKEND_FQDN="c3d.nginx.com"
OCSP_FQDN="ocsp.demo.com"
OCSP_PORT="2560"
OCSP_URL="http://${OCSP_FQDN}:${OCSP_PORT}"

# --- Output layout ----------------------------------------------
# All generated keys/certs land here. Listed in .gitignore.
OUT_DIR="${OUT_DIR:-$(cd "$(dirname "${BASH_SOURCE[0]:-$0}")" && pwd)/out}"

# Per-CA subdirectories
SERVER_CA_DIR="${OUT_DIR}/server-ca"
CLIENT_CA_DIR="${OUT_DIR}/client-ca"
FORGING_CA_DIR="${OUT_DIR}/forging-ca"

# End-entity material
BIGIP_DIR="${OUT_DIR}/bigip"
BACKEND_DIR="${OUT_DIR}/backend"
CLIENT_DIR="${OUT_DIR}/client"
OCSP_DIR="${OUT_DIR}/ocsp"

# --- Cryptographic parameters -----------------------------------
CA_KEY_BITS=4096
EE_KEY_BITS=2048

CA_DAYS=3650           # 10y for CAs
EE_DAYS=825            # ~2y for end-entity (matches modern browser caps)
OCSP_RESP_DAYS=825     # OCSP responder cert lifetime
OCSP_NEXT_UPDATE_HRS=24  # how often OCSP responses say "ask again"

# --- Subject defaults (override in env if you want) -------------
SUBJ_C="${SUBJ_C:-US}"
SUBJ_ST="${SUBJ_ST:-WA}"
SUBJ_L="${SUBJ_L:-Seattle}"
SUBJ_O="${SUBJ_O:-F5 C3D Demo}"
SUBJ_OU="${SUBJ_OU:-PKI}"

# --- Test client identity ---------------------------------------
# This is what shows up in the Win 11 client certificate.
CLIENT_CN="${CLIENT_CN:-test-user}"
CLIENT_EMAIL="${CLIENT_EMAIL:-test-user@example.com}"
CLIENT_UPN="${CLIENT_UPN:-test-user@example.com}"

# --- PKCS#12 export password ------------------------------------
# Used by 05-export-pkcs12.sh for the Win 11 .pfx and the
# BIG-IP forging-CA bundle. CHANGE THIS for anything beyond a demo.
PFX_PASSWORD="${PFX_PASSWORD:-changeme}"

# --- Placeholder SAN values (technical) -------------------------
# OpenSSL evaluates ALL extension sections in openssl.cnf when it
# parses the config, even ones we're not using on this command. We
# need the $ENV:: references to resolve to *something* at every
# invocation, so set safe placeholders here. Issue scripts export
# real values right before signing — those override these.
export BIGIP_SAN="${BIGIP_SAN:-DNS:placeholder.example}"
export BACKEND_SAN="${BACKEND_SAN:-DNS:placeholder.example}"
export CLIENT_SAN="${CLIENT_SAN:-email:placeholder@example.com}"
export OCSP_URL                              # already exported above
export CA_DIR="${CA_DIR:-${OUT_DIR}/.tmp-ca-placeholder}"
export EE_DAYS                               # already set above
mkdir -p "$CA_DIR"
